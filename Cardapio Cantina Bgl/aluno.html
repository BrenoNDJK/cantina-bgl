<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aluno</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    🍔 Cardápio da Cantina
</header>

<h2 class="titulo">Cardápio da Semana</h2>

<!-- Onde os alimentos vão aparecer -->
<section class="produtos" id="lista"></section>

<script>
async function carregar() {
    try {
        const res = await fetch("http://localhost:3000/cardapio");
        const dados = await res.json();

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        // se não tiver nada
        if (dados.length === 0) {
            lista.innerHTML = "<p style='text-align:center;'>Nenhum item no cardápio ainda 😢</p>";
            return;
        }

        // criar os cards
        dados.forEach(item => {
            lista.innerHTML += `
                <div class="produto">
                    <h2>${item.comida}</h2>
                    <p>${item.dia}</p>
                </div>
            `;
        });

    } catch (erro) {
        console.error("Erro:", erro);
        document.getElementById("lista").innerHTML =
            "<p style='text-align:center;'>Erro ao carregar o cardápio 😢</p>";
    }
}

// carregar automaticamente
carregar();
</script>

</body>
</html>
