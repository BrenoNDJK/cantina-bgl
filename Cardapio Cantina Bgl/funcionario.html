<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cardápio Cantina Burkart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    🍔 Cardápio Cantina Burkart
</header>

<h2 class="titulo">Cardápio da Semana</h2>

<section class="produtos">

    <div class="produto">
        <h2>🍛 Arroz e Feijão</h2>
        <p>Segunda-feira</p>
        <p>so pra testar</p>
        <button onclick="editar(this)">Editar</button>
    </div>

    <div class="produto">
        <h2>🍝 Macarrão</h2>
        <p>Terça-feira</p>
        <button onclick="editar(this)">Editar</button>
    </div>

    <div class="produto">
        <h2>🍔 Hambúrguer</h2>
        <p>Quarta-feira</p>
        <button onclick="editar(this)">Editar</button>
    </div>

    <div class="produto">
        <h2>🌭 Cachorro-quente</h2>
        <p>Quinta-feira</p>
        <button onclick="editar(this)">Editar</button>
    </div>

</section>

<footer>
    © 2026 Cantina Escolar
</footer>
<script>
async function editar(botao) {
    let produto = botao.parentElement;

    let titulo = produto.querySelector("h2");
    let dia = produto.querySelector("p").innerText;

    let novoNome = prompt("Digite o novo nome da comida:");

    if (novoNome && novoNome.trim() !== "") {

        // muda na tela (IMPORTANTE!)
        titulo.innerText = novoNome;

        // envia pro servidor
        try {
            await fetch("http://localhost:3000/cardapio", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    comida: novoNome,
                    dia: dia
                })
            });

            alert("Salvo com sucesso!");
        } catch (erro) {
            alert("Erro ao salvar!");
            console.error(erro);
        }
    }
}
</script>
</body>
</html>
