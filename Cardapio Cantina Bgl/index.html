<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantina Burkart</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

<header>
    <h1>Cantina Burkart</h1>
</header>

<div class="Identificação">
    <label for="nomefucionario">Nome Do Funcionário</label><br>
    <input type="text" id="nomefuncionario"><br>

    <label for="senhafuncionario">Senha Do Funcionário</label><br>
    <input type="text" name="senha" id="senha"><br>
    <button onclick="loginFuncionario()">Entrar como Funcionário</button><br>

    <label for="nomealuno">Nome Do Aluno</label><br>
    <input type="text" id="nomealuno"><br>
    
    <label for="senhaaluno">Senha Do Aluno</label><br>
    <input type="text" name="senhaaluno" id="senhaaluno"><br>
    <button onclick="loginAluno()">Entrar como Aluno</button>
</div>

<script>
function loginFuncionario() {
    let nome = document.getElementById("nomefuncionario").value;
    let senha = document.getElementById("senha").value;

    // Exemplo simples (depois você pode melhorar)
    if (nome === "tia" && senha === "123") {
        window.location.href = "funcionario.html";
    } else {
        alert("Login de funcionário inválido!");
    }
}

function loginAluno() {
    let nome = document.getElementById("nomealuno").value;
    let senha = document.getElementById("senhaaluno").value;

    if (nome === "aluno" && senha === "123") {
        window.location.href = "aluno.html";
    } else {
        alert("Login de aluno inválido!");
    }
}
</script>
</body>
</html>
